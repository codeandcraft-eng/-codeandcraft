<svg xmlns="http://w3.org" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Fundo escuro texturizado poligonal abstrato -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14191e" />
      <stop offset="50%" stop-color="#1a222a" />
      <stop offset="100%" stop-color="#0f1317" />
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#00b4d8" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe4a0" />
      <stop offset="50%" stop-color="#cca45c" />
      <stop offset="100%" stop-color="#96702d" />
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#8a99a8" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background plano simulando o Poligonal -->
  <rect width="800" height="450" fill="url(#bgGrad)" />
  <path d="M 0 0 L 300 0 L 180 250 L 0 120 Z" fill="#182027" opacity="0.4"/>
  <path d="M 800 450 L 500 450 L 620 200 L 800 300 Z" fill="#10151a" opacity="0.6"/>
  <path d="M 400 0 L 550 180 L 320 280 Z" fill="#1c2630" opacity="0.3"/>

  <g transform="translate(0, -10)">
    <!-- ÍCONE C&C CENTRALIZADO -->
    <!-- C da Esquerda (Code / Cyber) -->
    <g filter="url(#shadow)">
      <path d="M 360 145 C 320 145, 290 175, 290 215 C 290 255, 320 285, 360 285 C 385 285, 405 270, 415 250" 
            fill="none" stroke="url(#neonCyan)" stroke-width="14" stroke-linecap="round" filter="url(#neonGlow)"/>
      <!-- Detalhes de circuito no primeiro C -->
      <path d="M 340 170 C 320 180, 315 200, 315 215 C 315 235, 325 250, 345 258" 
            fill="none" stroke="#00f3ff" stroke-width="3" opacity="0.7" stroke-dasharray="6,4"/>
      <circle cx="360" cy="145" r="5" fill="#ffffff" filter="url(#neonGlow)"/>
      <circle cx="415" cy="250" r="5" fill="#00f3ff" filter="url(#neonGlow)"/>
      <!-- Linhas Conectoras de Linhas de Código -->
      <path d="M 285 200 L 270 200 M 295 175 L 280 165 M 310 155 L 305 140" stroke="#00f3ff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="270" cy="200" r="3" fill="#00f3ff"/>
      <circle cx="280" cy="165" r="3" fill="#00f3ff"/>
      <circle cx="305" cy="140" r="3" fill="#00f3ff"/>
    </g>

    <!-- E comercial (&) Metálico Central -->
    <g filter="url(#shadow)">
      <path d="M 412 258 C 400 275, 380 285, 365 270 C 350 255, 375 235, 395 215 C 405 200, 410 185, 398 175 C 388 165, 375 180, 385 198 C 395 215, 425 245, 445 255 C 455 260, 465 252, 460 240" 
            fill="none" stroke="url(#silverGrad)" stroke-width="14" stroke-linecap="round"/>
      <path d="M 412 258 C 400 275, 380 285, 365 270 C 350 255, 375 235, 395 215" 
            fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
    </g>

    <!-- C da Direita (Craft / Artefato) -->
    <g filter="url(#shadow)">
      <path d="M 440 180 C 450 160, 470 145, 495 145 C 535 145, 565 175, 565 215 C 565 255, 535 285, 495 285 C 465 285, 445 265, 440 245" 
            fill="none" stroke="url(#goldGrad)" stroke-width="14" stroke-linecap="round"/>
      <!-- Detalhes mecânicos/engrenagem no segundo C -->
      <path d="M 520 145 L 523 135 L 533 137 L 531 147 M 545 160 L 553 153 L 560 160 L 551 168" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round"/>
      <path d="M 515 285 L 512 295 L 502 293 L 504 283" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round"/>
    </g>

    <!-- A Pena Tinteiro Estilizada (Craftsmanship) -->
    <g filter="url(#shadow)" transform="rotate(-15, 460, 180)">
      <!-- Corpo da Pena -->
      <path d="M 440 210 C 450 160, 480 120, 520 100 C 500 130, 485 170, 470 215 Z" fill="url(#goldGrad)"/>
      <!-- Base da caneta/Pena -->
      <path d="M 440 210 L 433 222 L 442 225 L 446 215 Z" fill="#96702d"/>
      <!-- Corte central da pena -->
      <path d="M 436 216 L 490 135" fill="none" stroke="#1a222a" stroke-width="2"/>
      <!-- Detalhes de cortes na pena (linhas de código vazadas) -->
      <path d="M 495 125 L 510 128 M 483 145 L 500 150 M 473 165 L 488 170" fill="none" stroke="#1a222a" stroke-width="2"/>
      <!-- Quadrados de partículas digitais saindo da pena -->
      <rect x="525" y="95" width="8" height="8" fill="#ffe4a0" opacity="0.8"/>
      <rect x="540" y="105" width="5" height="5" fill="#cca45c"/>
      <rect x="515" y="85" width="6" height="6" fill="#ffffff" opacity="0.9"/>
    </g>
  </g>

  <!-- TEXTO FORMATADO ABAIXO DO ÍCONE -->
  <text x="400" y="345" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-weight="800" font-size="38" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    <tspan fill="url(#neonCyan)">Code</tspan><tspan fill="url(#goldGrad)">&amp;</tspan><tspan fill="url(#neonCyan)">Craft</tspan>
  </text>
  
  <text x="400" y="395" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-weight="700" font-size="24" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="12">
    LAB
  </text>
</svg>
